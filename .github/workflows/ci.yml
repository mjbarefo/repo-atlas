name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyzer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-editable --reinstall-package atlas-analyzer
      - run: .venv/bin/python scripts/generate_models.py --check
      - run: .venv/bin/black --check analyzer scripts
      - run: .venv/bin/ruff check analyzer scripts
      - run: .venv/bin/pytest

  viewer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: viewer/package-lock.json
      - run: npm --prefix viewer ci
      - run: npm --prefix viewer run check:generated
      - run: npm --prefix viewer run typecheck
      - run: npm --prefix viewer test
      - run: npm --prefix viewer run build
